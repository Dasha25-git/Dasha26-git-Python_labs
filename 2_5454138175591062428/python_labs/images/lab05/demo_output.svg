<text x="24" y="50" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb">
<tspan x="24" y="50">============ Сценарий 1. Три стратегии сортировки ============</tspan>
<tspan x="24" y="72"></tspan>
<tspan x="24" y="94">По названию (6):</tspan>
<tspan x="24" y="116">- «1984» — Джордж Оруэлл, 1949, 500.00 RUB, доступна=True</tspan>
<tspan x="24" y="138">- «Python. К вершинам мастерства» — Лучано Рамальо, 2022, 2100.00 RUB, доступна=True</tspan>
<tspan x="24" y="160">- «Война и мир» — Лев Толстой, 1869, 450.00 RUB, доступна=True</tspan>
<tspan x="24" y="182">- «Идиот» — Фёдор Достоевский, 1869, 420.00 RUB, доступна=False</tspan>
<tspan x="24" y="204">- «Мастер и Маргарита» — Михаил Булгаков, 1967, 650.00 RUB, доступна=True</tspan>
<tspan x="24" y="226">- «Чистый код» — Роберт Мартин, 2008, 1300.00 RUB, доступна=True</tspan>
<tspan x="24" y="248"></tspan>
<tspan x="24" y="270">По цене (6):</tspan>
<tspan x="24" y="292">- «Идиот» — Фёдор Достоевский, 1869, 420.00 RUB, доступна=False</tspan>
<tspan x="24" y="314">- «Война и мир» — Лев Толстой, 1869, 450.00 RUB, доступна=True</tspan>
<tspan x="24" y="336">- «1984» — Джордж Оруэлл, 1949, 500.00 RUB, доступна=True</tspan>
<tspan x="24" y="358">- «Мастер и Маргарита» — Михаил Булгаков, 1967, 650.00 RUB, доступна=True</tspan>
<tspan x="24" y="380">- «Чистый код» — Роберт Мартин, 2008, 1300.00 RUB, доступна=True</tspan>
<tspan x="24" y="402">- «Python. К вершинам мастерства» — Лучано Рамальо, 2022, 2100.00 RUB, доступна=True</tspan>
<tspan x="24" y="424"></tspan>
<tspan x="24" y="446">По году и названию (6):</tspan>
<tspan x="24" y="468">- «Война и мир» — Лев Толстой, 1869, 450.00 RUB, доступна=True</tspan>
<tspan x="24" y="490">- «Идиот» — Фёдор Достоевский, 1869, 420.00 RUB, доступна=False</tspan>
<tspan x="24" y="512">- «1984» — Джордж Оруэлл, 1949, 500.00 RUB, доступна=True</tspan>
<tspan x="24" y="534">- «Мастер и Маргарита» — Михаил Булгаков, 1967, 650.00 RUB, доступна=True</tspan>
<tspan x="24" y="556">- «Чистый код» — Роберт Мартин, 2008, 1300.00 RUB, доступна=True</tspan>
<tspan x="24" y="578">- «Python. К вершинам мастерства» — Лучано Рамальо, 2022, 2100.00 RUB, доступна=True</tspan>
<tspan x="24" y="600"></tspan>
<tspan x="24" y="622">============ Сценарий 2. filter(), фабрики функций и lambda ============</tspan>
<tspan x="24" y="644"></tspan>
<tspan x="24" y="666">filter(is_ebook, library):</tspan>
<tspan x="24" y="688">- «Чистый код» — Роберт Мартин, 2008, 1300.00 RUB, доступна=True</tspan>
<tspan x="24" y="710">- «Python. К вершинам мастерства» — Лучано Рамальо, 2022, 2100.00 RUB, доступна=True</tspan>
<tspan x="24" y="732"></tspan>
<tspan x="24" y="754">Фабрика make_price_filter(700) (4):</tspan>
<tspan x="24" y="776">- «Война и мир» — Лев Толстой, 1869, 450.00 RUB, доступна=True</tspan>
<tspan x="24" y="798">- «Идиот» — Фёдор Достоевский, 1869, 420.00 RUB, доступна=False</tspan>
<tspan x="24" y="820">- «Мастер и Маргарита» — Михаил Булгаков, 1967, 650.00 RUB, доступна=True</tspan>
<tspan x="24" y="842">- «1984» — Джордж Оруэлл, 1949, 500.00 RUB, доступна=True</tspan>
<tspan x="24" y="864"></tspan>
<tspan x="24" y="886">Фабрика make_year_filter(2000) (2):</tspan>
<tspan x="24" y="908">- «Чистый код» — Роберт Мартин, 2008, 1300.00 RUB, доступна=True</tspan>
<tspan x="24" y="930">- «Python. К вершинам мастерства» — Лучано Рамальо, 2022, 2100.00 RUB, доступна=True</tspan>
<tspan x="24" y="952">Именованная функция и lambda дали одинаковый размер: 4 == 4</tspan>
<tspan x="24" y="974"></tspan>
<tspan x="24" y="996">============ Сценарий 3. map() и преобразование коллекции ============</tspan>
<tspan x="24" y="1018"></tspan>
<tspan x="24" y="1040">map(lambda book: book.title, library):</tspan>
<tspan x="24" y="1062">- Война и мир</tspan>
<tspan x="24" y="1084">- Идиот</tspan>
<tspan x="24" y="1106">- Чистый код</tspan>
<tspan x="24" y="1128">- Python. К вершинам мастерства</tspan>
<tspan x="24" y="1150">- Мастер и Маргарита</tspan>
<tspan x="24" y="1172">- 1984</tspan>
<tspan x="24" y="1194"></tspan>
<tspan x="24" y="1216">map(to_dict, library) первые 3:</tspan>
<tspan x="24" y="1238">- {&#x27;title&#x27;: &#x27;Война и мир&#x27;, &#x27;author&#x27;: &#x27;Лев Толстой&#x27;, &#x27;year&#x27;: 1869, &#x27;price&#x27;: 450.0, &#x27;condition&#x27;: &#x27;available&#x27;, &#x27;type&#x27;: &#x27;PrintedBook&#x27;}</tspan>
<tspan x="24" y="1260">- {&#x27;title&#x27;: &#x27;Идиот&#x27;, &#x27;author&#x27;: &#x27;Фёдор Достоевский&#x27;, &#x27;year&#x27;: 1869, &#x27;price&#x27;: 420.0, &#x27;condition&#x27;: &#x27;borrowed&#x27;, &#x27;type&#x27;: &#x27;PrintedBook&#x27;}</tspan>
<tspan x="24" y="1282">- {&#x27;title&#x27;: &#x27;Чистый код&#x27;, &#x27;author&#x27;: &#x27;Роберт Мартин&#x27;, &#x27;year&#x27;: 2008, &#x27;price&#x27;: 1300.0, &#x27;condition&#x27;: &#x27;available&#x27;, &#x27;type&#x27;: &#x27;EBook&#x27;}</tspan>
<tspan x="24" y="1304"></tspan>
<tspan x="24" y="1326">library.apply(reading_card()):</tspan>
<tspan x="24" y="1348">- «Война и мир»: примерно 35.0 ч.</tspan>
<tspan x="24" y="1370">- «Идиот»: примерно 18.3 ч.</tspan>
<tspan x="24" y="1392">- «Чистый код»: примерно 10.3 ч.</tspan>
<tspan x="24" y="1414">- «Python. К вершинам мастерства»: примерно 22.5 ч.</tspan>
<tspan x="24" y="1436">- «Мастер и Маргарита»: примерно 13.0 ч.</tspan>
<tspan x="24" y="1458">- «1984»: примерно 10.8 ч.</tspan>
<tspan x="24" y="1480"></tspan>
<tspan x="24" y="1502">============ Сценарий 4. Полная цепочка filter -&gt; sort -&gt; apply ============</tspan>
<tspan x="24" y="1524"></tspan>
<tspan x="24" y="1546">Доступные книги до 1500 RUB по возрастанию цены:</tspan>
<tspan x="24" y="1568">- Печатная книга «Война и мир» доступна на полке A-01.</tspan>
<tspan x="24" y="1590">- Аудиокнига «1984» доступна для прослушивания, диктор: Александр Клюквин.</tspan>
<tspan x="24" y="1612">- Аудиокнига «Мастер и Маргарита» доступна для прослушивания, диктор: Сергей Чонишвили.</tspan>
<tspan x="24" y="1634">- Электронная книга «Чистый код» доступна для скачивания в формате PDF.</tspan>
<tspan x="24" y="1656"></tspan>
<tspan x="24" y="1678">============ Сценарий 5. Замена стратегии без изменения коллекции ============</tspan>
<tspan x="24" y="1700"></tspan>
<tspan x="24" y="1722">DiscountStrategy(15):</tspan>
<tspan x="24" y="1744">- «Война и мир»: 382.50 RUB со скидкой 15%</tspan>
<tspan x="24" y="1766">- «Идиот»: 357.00 RUB со скидкой 15%</tspan>
<tspan x="24" y="1788">- «Чистый код»: 1105.00 RUB со скидкой 15%</tspan>
<tspan x="24" y="1810">- «Python. К вершинам мастерства»: 1785.00 RUB со скидкой 15%</tspan>
<tspan x="24" y="1832">- «Мастер и Маргарита»: 552.50 RUB со скидкой 15%</tspan>
<tspan x="24" y="1854">- «1984»: 425.00 RUB со скидкой 15%</tspan>
<tspan x="24" y="1876"></tspan>
<tspan x="24" y="1898">FormatLabelStrategy():</tspan>
<tspan x="24" y="1920">- «Война и мир»: печатная книга, полка A-01</tspan>
<tspan x="24" y="1942">- «Идиот»: печатная книга, полка B-14</tspan>
<tspan x="24" y="1964">- «Чистый код»: электронная книга PDF</tspan>
<tspan x="24" y="1986">- «Python. К вершинам мастерства»: электронная книга EPUB</tspan>
<tspan x="24" y="2008">- «Мастер и Маргарита»: аудиокнига, 780 мин.</tspan>
<tspan x="24" y="2030">- «1984»: аудиокнига, 645 мин.</tspan>
<tspan x="24" y="2052"></tspan>
<tspan x="24" y="2074">============ Сценарий 6. Фильтрация по типу через фабрику ============</tspan>
<tspan x="24" y="2096"></tspan>
<tspan x="24" y="2118">Только EBook (2):</tspan>
<tspan x="24" y="2140">- «Чистый код» — Роберт Мартин, 2008, 1300.00 RUB, доступна=True</tspan>
<tspan x="24" y="2162">- «Python. К вершинам мастерства» — Лучано Рамальо, 2022, 2100.00 RUB, доступна=True</tspan>
